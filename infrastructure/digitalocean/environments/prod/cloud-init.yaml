#cloud-config
# GoodLifeTask — Prod API Droplet Bootstrap

package_update: true
package_upgrade: true

packages:
  - git
  - curl
  - unzip
  - nginx

runcmd:
  # Install Node.js 20
  - curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
  - apt-get install -y nodejs
  - npm install -g pnpm

  # Clone repo
  - git clone https://github.com/Goodlifetask/GLTCLAUDE.git /opt/goodlifetask

  # Write .env for API
  - |
    cat > /opt/goodlifetask/services/api/.env << 'ENVEOF'
    NODE_ENV=${environment}
    PORT=3001
    LOG_LEVEL=warn
    API_URL=http://0.0.0.0:3001
    DATABASE_URL=${database_url}
    REDIS_URL=${redis_url}
    JWT_SECRET=${jwt_secret}
    JWT_ISSUER=goodlifetask.com
    JWT_AUDIENCE=goodlifetask-api
    ACCESS_TOKEN_TTL=900
    REFRESH_TOKEN_TTL=2592000
    AWS_REGION=${spaces_region}
    AWS_ACCESS_KEY_ID=${spaces_key}
    AWS_SECRET_ACCESS_KEY=${spaces_secret}
    S3_BUCKET_NAME=${spaces_bucket}
    S3_CDN_URL=https://${spaces_bucket}.${spaces_region}.cdn.digitaloceanspaces.com
    ANTHROPIC_API_KEY=${anthropic_key}
    CORS_ORIGINS=${frontend_url}
    FRONTEND_URL=${frontend_url}
    ENVEOF

  # Install dependencies and run migrations (only runs on first node)
  - cd /opt/goodlifetask && pnpm install --frozen-lockfile
  - cd /opt/goodlifetask && pnpm db:migrate

  # Systemd service: API
  - |
    cat > /etc/systemd/system/glt-api.service << 'SVCEOF'
    [Unit]
    Description=GoodLifeTask API
    After=network.target

    [Service]
    Type=simple
    WorkingDirectory=/opt/goodlifetask/services/api
    ExecStart=/usr/bin/node /opt/goodlifetask/node_modules/tsx/dist/cli.mjs src/server.ts
    Restart=always
    RestartSec=5
    StandardOutput=journal
    StandardError=journal
    SyslogIdentifier=glt-api

    [Install]
    WantedBy=multi-user.target
    SVCEOF

  - systemctl daemon-reload
  - systemctl enable glt-api
  - systemctl start glt-api
